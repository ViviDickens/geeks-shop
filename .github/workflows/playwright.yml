name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests every Monday at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Next.js app
        run: npm run build
        env:
          CI: true

      - name: Run Playwright tests - ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true
        env:
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.node-version }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.node-version }}-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/results.xml
          check_name: Test Results - ${{ matrix.node-version }}-${{ matrix.browser }}

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
            const totalTests = testResults.stats.expected + testResults.stats.unexpected;
            const passed = testResults.stats.expected;
            const failed = testResults.stats.unexpected;
            
            const comment = `
            ## Playwright Test Results - ${{ matrix.browser }}
            
            - **Total Tests**: ${totalTests}
            - **Passed**: ${passed} ✅
            - **Failed**: ${failed} ❌
            - **Node Version**: ${{ matrix.node-version }}
            
            [View Detailed Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    if: always()
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Allure
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: artifacts/test-results-18.x-chromium
          gh_pages: gh-pages
          keep_reports: 20

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: test
    
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Generate summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Matrix Configuration:" >> $GITHUB_STEP_SUMMARY
          echo "- Node Versions: 18.x, 20.x" >> $GITHUB_STEP_SUMMARY
          echo "- Browsers: chromium, firefox, webkit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifact Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [Playwright Reports](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Test Results XML](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
